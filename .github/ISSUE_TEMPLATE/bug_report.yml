name: Bug report
description: Something isn't working as expected
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, sample repo, or minimal snippet.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: cli-version
    attributes:
      label: '@conductor-kit/cli version'
      placeholder: '0.1.0'
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Agent adapter (if relevant)
      options:
        - Claude Code
        - Codex CLI
        - Cursor
        - None (CLI only)
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS / Node version
      placeholder: 'macOS 14 / Node 22'
    validations:
      required: true
