name: Release

# Manual-only until NPM_TOKEN is configured and the project is ready to publish.
# Flip to `on: push: branches: [main]` when Changesets-driven publishing goes live.
on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: Changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # npm trusted-publishing via OIDC landed in npm v11.5.1. Node 22 ships
      # ~npm 10, which fails ENEEDAUTH when NPM_TOKEN is unset. `npm@latest`
      # self-upgrade runs into a MODULE_NOT_FOUND on `promise-retry` on the
      # tooled-cache Node; pin to a known-good release line instead.
      - name: Install npm 11 (trusted-publishing support)
        run: npm install -g npm@11

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OIDC trusted publishing: npm CLI (v11.5.1+) exchanges the
          # GitHub Actions OIDC token for a short-lived npm auth token,
          # provided each package has a matching trusted publisher configured
          # on npmjs.com — see docs/RELEASE.md. NPM_TOKEN must be absent for
          # the OIDC path to trigger; otherwise the CLI uses the token first
          # and skips OIDC. Provenance is attached automatically.
          NPM_CONFIG_PROVENANCE: 'true'
