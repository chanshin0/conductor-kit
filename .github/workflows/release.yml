name: Release

# Manual-only until NPM_TOKEN is configured and the project is ready to publish.
# Flip to `on: push: branches: [main]` when Changesets-driven publishing goes live.
on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: Changesets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          # 10.33+ handles OIDC trusted-publishing over GitHub Actions'
          # id-token flow natively; earlier 10.x signs provenance but
          # doesn't exchange the OIDC token for a publish credential.
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      # npm trusted-publishing via OIDC landed in npm v11.5.1. Node 22 ships
      # ~npm 10, which fails ENEEDAUTH when NPM_TOKEN is unset. In-place
      # `npm install -g npm@...` hits MODULE_NOT_FOUND on `promise-retry`
      # because the old npm's arborist sees its own replacement mid-swap —
      # install into a scratch prefix and put it first on PATH instead.
      - name: Install npm 11 (trusted-publishing support)
        run: |
          mkdir -p /tmp/npm11
          npm install --prefix /tmp/npm11 npm@11
          echo "/tmp/npm11/node_modules/.bin" >> "$GITHUB_PATH"
      - name: Show npm version
        run: npm --version

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm changeset version
          commit: 'chore: version packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # OIDC trusted publishing: npm CLI (v11.5.1+) exchanges the
          # GitHub Actions OIDC token for a short-lived npm auth token,
          # provided each package has a matching trusted publisher configured
          # on npmjs.com — see docs/RELEASE.md. NPM_TOKEN must be absent for
          # the OIDC path to trigger; otherwise the CLI uses the token first
          # and skips OIDC. Provenance is attached automatically.
          NPM_CONFIG_PROVENANCE: 'true'
