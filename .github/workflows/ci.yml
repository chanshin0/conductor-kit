name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r --filter=./packages/* --filter=./apps/* typecheck

      - name: Test
        run: pnpm -r --filter=./packages/* test

      - name: Format check
        run: pnpm format:check

  neutrality:
    name: no company-specific identifiers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regression grep
        run: |
          set +e
          PATTERN='CDS-?[0-9]|okestro|ceph|trombone|sds-workflow'
          MATCHES=$(grep -rEnI "$PATTERN" packages/ apps/ examples/ 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Company-specific identifiers found. conductor-kit must stay neutral."
            echo "$MATCHES"
            exit 1
          fi
          echo "ok: no forbidden identifiers"
